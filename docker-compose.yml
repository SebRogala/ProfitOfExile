services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: profitofexile_app
    volumes:
      - .:/app
      - go-pkg:/root/go/pkg
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://profitofexile:profitofexile@postgres:5432/profitofexile}
      - PORT=8080
      - MERCURE_URL=${MERCURE_URL:-http://mercure/.well-known/mercure}
      - MERCURE_JWT_SECRET=${MERCURE_JWT_SECRET:-!ChangeThisMercureHubJWTSecretKey!}
    networks:
      - infra
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.profitofexile-api.rule=Host(`profitofexile.localhost`) && PathPrefix(`/api`)"
      - "traefik.http.routers.profitofexile-api.entrypoints=websecure"
      - "traefik.http.routers.profitofexile-api.tls=true"
      - "traefik.http.services.profitofexile-api.loadbalancer.server.port=8080"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: profitofexile_frontend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - infra
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.profitofexile-frontend.rule=Host(`profitofexile.localhost`)"
      - "traefik.http.routers.profitofexile-frontend.entrypoints=websecure"
      - "traefik.http.routers.profitofexile-frontend.tls=true"
      - "traefik.http.routers.profitofexile-frontend.priority=1"
      - "traefik.http.services.profitofexile-frontend.loadbalancer.server.port=5173"

  collector:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: profitofexile_collector
    volumes:
      - .:/app
      - go-pkg:/root/go/pkg
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://profitofexile:profitofexile@postgres:5432/profitofexile}
      - PORT=8090
      - LEAGUE=${LEAGUE:-Mirage}
      # - NINJA_INTERVAL=15m       # deprecated, use NINJA_FALLBACK_INTERVAL
      # - NINJA_FALLBACK_INTERVAL=30m
      # - NINJA_MAX_AGE=30m
      # - NINJA_MAX_RETRIES=5
      # - NINJA_MIN_SLEEP=30s
      - MERCURE_URL=${MERCURE_URL:-http://mercure/.well-known/mercure}
      - MERCURE_JWT_SECRET=${MERCURE_JWT_SECRET:-!ChangeThisMercureHubJWTSecretKey!}
    networks:
      - infra
    restart: unless-stopped
    command: ["air", "-c", ".air.collector.toml"]

volumes:
  go-pkg:
  frontend_node_modules:

networks:
  infra:
    external: true
