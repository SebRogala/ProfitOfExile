name: Test & Deploy

on:
  push:
    branches: [main]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      collector: ${{ steps.filter.outputs.collector }}
      go: ${{ steps.filter.outputs.go }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
            server:
              - 'cmd/server/**'
              - 'internal/server/**'
              - 'internal/db/**'
              - 'internal/lab/**'
              - 'frontend/**'
              - 'go.mod'
              - 'go.sum'
              - 'Dockerfile'
            collector:
              - 'cmd/collector/**'
              - 'internal/collector/**'
              - 'internal/db/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'Dockerfile'

  test:
    needs: detect-changes
    if: needs.detect-changes.outputs.go == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

  deploy-server:
    needs: [detect-changes, test]
    if: |
      always()
      && needs.detect-changes.outputs.server == 'true'
      && (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Coolify deploy (server)
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          COOLIFY_UUID: ${{ secrets.COOLIFY_SERVER_UUID }}
          COOLIFY_WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK_URL }}
        run: |
          curl -sf -X GET \
            "${COOLIFY_WEBHOOK_URL}/api/v1/deploy?uuid=${COOLIFY_UUID}&force=false" \
            -H "Authorization: Bearer ${COOLIFY_TOKEN}"

  deploy-collector:
    needs: [detect-changes, test]
    if: |
      always()
      && needs.detect-changes.outputs.collector == 'true'
      && (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Coolify deploy (collector)
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          COOLIFY_UUID: ${{ secrets.COOLIFY_COLLECTOR_UUID }}
          COOLIFY_WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK_URL }}
        run: |
          curl -sf -X GET \
            "${COOLIFY_WEBHOOK_URL}/api/v1/deploy?uuid=${COOLIFY_UUID}&force=false" \
            -H "Authorization: Bearer ${COOLIFY_TOKEN}"
