name: Desktop Build

on:
  push:
    branches: [main]
    paths:
      - 'desktop/**'
    tags:
      - 'v-desktop-*'

# Note: GitHub evaluates push triggers as an OR between branches+paths and tags.
# A tag push matching v-desktop-* will trigger regardless of the paths filter.

jobs:
  build-desktop:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install frontend dependencies
        run: cd desktop && npm install --legacy-peer-deps

      - name: Build SvelteKit frontend
        run: cd desktop && npm run build

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: cd desktop && npx tauri build

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProfitOfExile
          path: desktop/src-tauri/target/release/ProfitOfExile.exe

      - name: Upload NSIS installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProfitOfExile-installer
          path: desktop/src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload NSIS signature
        uses: actions/upload-artifact@v4
        with:
          name: ProfitOfExile-sig
          path: desktop/src-tauri/target/release/bundle/nsis/*.sig

  release:
    needs: build-desktop
    if: startsWith(github.ref, 'refs/tags/v-desktop-')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: ProfitOfExile-installer
          path: artifacts/installer

      - name: Download signature
        uses: actions/download-artifact@v4
        with:
          name: ProfitOfExile-sig
          path: artifacts/sig

      - name: Download standalone exe
        uses: actions/download-artifact@v4
        with:
          name: ProfitOfExile
          path: artifacts/exe

      - name: Generate update manifest
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v-desktop-}"

          # Find the NSIS installer and its signature
          INSTALLER=$(ls artifacts/installer/*.exe | head -1)
          INSTALLER_NAME=$(basename "$INSTALLER")
          SIG=$(cat artifacts/sig/*.sig)

          cat > artifacts/latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": "See release notes on GitHub",
            "pub_date": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
            "platforms": {
              "windows-x86_64": {
                "signature": "${SIG}",
                "url": "https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${INSTALLER_NAME}"
              }
            }
          }
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/exe/*.exe
            artifacts/installer/*.exe
            artifacts/sig/*.sig
            artifacts/latest.json
          generate_release_notes: true
