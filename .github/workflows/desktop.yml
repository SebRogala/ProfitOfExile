name: Desktop Build

on:
  push:
    tags:
      - 'v-desktop-*'

jobs:
  build-desktop:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install frontend dependencies
        run: cd desktop && npm install --legacy-peer-deps

      - name: Build SvelteKit frontend
        run: cd desktop && npm run build

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          POE_SERVER_URL: ${{ secrets.POE_SERVER_URL }}
          VITE_SERVER_URL: ${{ secrets.POE_SERVER_URL }}
        run: cd desktop && npx tauri build

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProfitOfExile
          path: desktop/src-tauri/target/release/ProfitOfExile.exe

      - name: Upload NSIS installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProfitOfExile-installer
          path: desktop/src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload NSIS signature
        uses: actions/upload-artifact@v4
        with:
          name: ProfitOfExile-sig
          path: desktop/src-tauri/target/release/bundle/nsis/*.sig

  release:
    needs: build-desktop
    if: startsWith(github.ref, 'refs/tags/v-desktop-')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: ProfitOfExile-installer
          path: artifacts/installer

      - name: Download signature
        uses: actions/download-artifact@v4
        with:
          name: ProfitOfExile-sig
          path: artifacts/sig

      - name: Download standalone exe
        uses: actions/download-artifact@v4
        with:
          name: ProfitOfExile
          path: artifacts/exe

      - name: Prepare release assets
        env:
          GH_REPO: ${{ github.repository }}
          GH_REF: ${{ github.ref }}
        run: |
          TAG="${GH_REF#refs/tags/}"
          VERSION="${TAG#v-desktop-}"

          # Read the signature for latest.json
          SIG=$(cat artifacts/sig/*.sig)

          # Rename installer to fixed name (for stable download URLs)
          INSTALLER=$(ls artifacts/installer/*.exe | head -1)
          cp "$INSTALLER" artifacts/ProfitOfExile-setup.exe

          # Rename standalone for clarity
          cp artifacts/exe/ProfitOfExile.exe artifacts/ProfitOfExile-standalone.exe

          # Generate update manifest (updater fetches this to check for new versions)
          cat > artifacts/latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": "See release notes on GitHub",
            "pub_date": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
            "platforms": {
              "windows-x86_64": {
                "signature": "${SIG}",
                "url": "https://github.com/${GH_REPO}/releases/download/${TAG}/ProfitOfExile-setup.exe"
              }
            }
          }
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/ProfitOfExile-setup.exe
            artifacts/ProfitOfExile-standalone.exe
            artifacts/latest.json
          generate_release_notes: true

      # Discord announcement handled via manual dispatch workflow (discord-announce.yml)
      # so desktop + backend changes can be combined into one quality message.
