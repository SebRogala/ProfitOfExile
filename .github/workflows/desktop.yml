name: Desktop Build

on:
  push:
    branches: [main]
    paths:
      - 'desktop/**'
    tags:
      - 'v-desktop-*'

# Note: GitHub evaluates push triggers as an OR between branches+paths and tags.
# A tag push matching v-desktop-* will trigger regardless of the paths filter.

jobs:
  build-desktop:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install frontend dependencies
        run: cd desktop && npm install --legacy-peer-deps

      - name: Build SvelteKit frontend
        run: cd desktop && npm run build

      - name: Build Tauri app
        run: cd desktop && npx tauri build

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProfitOfExile
          path: desktop/src-tauri/target/release/ProfitOfExile.exe

      - name: Upload NSIS installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProfitOfExile-installer
          path: desktop/src-tauri/target/release/bundle/nsis/*.exe

  release:
    needs: build-desktop
    if: startsWith(github.ref, 'refs/tags/v-desktop-')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: ProfitOfExile
          path: artifacts/exe

      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          name: ProfitOfExile-installer
          path: artifacts/installer

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/exe/*.exe
            artifacts/installer/*.exe
          generate_release_notes: true
